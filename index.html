<!doctype html>
<!-- ↓enをjaに変更する -->
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>WCB Cafe</title>
    <meta
      name="description"
      content="ブレンドコーヒーとヘルシーなオーガニックフードを提供するカフェ"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- OGP -->
    <meta property="og:url" content="https://mjtmmts-ux.github.io/wcbcafe/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="WCB Cafe" />
    <meta
      property="og:description"
      content="おしゃれなカフェで癒やされてみませんか?無添加の食材で体の中からリフレッシュ。"
    />
    <meta
      property="og:image"
      content="https://mjtmmts-ux.github.io/wcbcafe/images/ogp.jpg"
    />
    <!-- ↓p216ファビコン -->
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <!-- ↓リセットCSSいまいちわかんない -->
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css" />
    <!-- ↓Googleフォントのリンクをコピペ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Hachi+Maru+Pop&family=Kaisei+Decol&family=M+PLUS+1:wght@100..900&family=Philosopher:ital,wght@0,400;0,700;1,400;1,700&family=Yuji+Mai&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- ↓背景画像のクラス -->
    <div class="cover cover-home">
      <header class="page-header wrapper">
        <!-- ← wrapper クラスを追加 p211-->
        <!-- ↓ロゴ画像がタイトルだけど、画像が表示されなかったときのためにタイトルとしてh1のクラスを設定↓-->
        <h1 class="align-center">
          <!-- ↓リンクを貼るためのaタグ -->
          <a href="index.html"
            ><img class="logo" src="images/logo.svg" alt="WCBカフェ ホーム"
          /></a>
          <!-- ↑フォトショでつくるロゴのピクセルサイズ目安をもう一度聞きたい -->
        </h1>
        <nav>
          <ul class="main-nav font-english">
            <!-- ↓メニュータブを増やしたらリンクのaタグも増やす -->
            <li><a href="news.html">News</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="contact.html">Contact</a></li>
          </ul>
        </nav>
      </header>
      <!-- ↓キャッチコピーのクラス -->
      <h2 class="page-title font-english">We'll Make Your Day</h2>
    </div>
    <!-- ↓見出しと文章のクラス -->
    <section class="about">
      <h3 class="heading-large font-english">About Cafe</h3>
      <p>
        WCB
        CAFEは無添加の厳選食材とおしゃれな店内が魅力のカフェです。心と体に優しい、それでいて飽きのこない空間をご用意しています。
        素材の本来の美味しさを引き出したメニューを楽しみながら、癒しの時間をお過ごしください。
      </p>
      <!-- ↓リンクボタンを中央に配置したいので、divのクラスの中にボタンのクラスを設置 -->
      <div class="align-center">
        <a class="btn" href="menu.html">メニューを見る</a>
        <!-- ↓exa-so.co.jpからボタンのコピペをしてみた -->
        <p><button class="btn-gradient-three">Premium Action</button></p>
      </div>
    </section>
    <!-- ↓フッター部分のクラス -->
    <footer class="page-footer">
      <h3 class="heading-large font-english">Information</h3>
      <table class="info">
        <tr>
          <th>住所</th>
          <td>東京都港区六本木 0-0 ◯◯◯</td>
        </tr>
        <tr>
          <th>電話</th>
          <td>03-1111-XXXX</td>
        </tr>
        <tr>
          <th>営業時間</th>
          <td>10:00〜20:00</td>
        </tr>
        <tr>
          <th>店休日</th>
          <td>水曜</td>
        </tr>
      </table>
      <!-- ↓コピーライトの追加 -->
      <div class="copyright">
        <small>&copy; 2010 WCB Cafe</small>
      </div>
    </footer>
  </body>
</html>
